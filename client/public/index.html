<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Events</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>NYC Events</h1>
    <p>Explore the best events happening around New York City!</p>
  </header>

  <!-- SEARCH BAR -->
  <form id="search-form">
    <input type="text" id="search-input" placeholder="Search events by name">
    <button type="submit">Search</button>
    <button id="resetSearch">Back to All Events</button>
  </form>

  <div id="events-container"></div>

  <script src="main.js"></script>

</body>
</html>
